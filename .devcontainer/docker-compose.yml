services:
  app:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    volumes:
      - ../:/workspace
    command: sleep infinity
    env_file:
      - ../.env
    depends_on:
      - db
    networks:
      - spring-dev-network

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - spring-dev-network

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - ../servers.json:/pgadmin4/servers.json:ro
    networks:
      - spring-dev-network

volumes:
  postgres-data:

networks:
  spring-dev-network:
    driver: bridge